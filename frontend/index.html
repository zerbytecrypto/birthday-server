<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Birthday Checker</title>

<style>
body{
    background:#0f172a;
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.container{
    width:90%;
    max-width:400px;
    background:#1e293b;
    padding:20px;
    border-radius:20px;
}

input{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    margin-top:15px;
    font-size:16px;
}

button{
    width:100%;
    padding:15px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:#00d084;
    color:black;
    font-weight:bold;
    font-size:16px;
}

.result{
    margin-top:20px;
    line-height:2;
}
</style>
</head>
<body>

<div class="container">
    <h2>Birthday Checker</h2>

    <input type="date" id="dob">

    <button onclick="checkBirthday()">
        Check Birthday
    </button>

    <div class="result" id="result"></div>
</div>

<script>

async function checkBirthday() {

    const dob = document.getElementById("dob").value;

    const resultDiv = document.getElementById("result");

    resultDiv.innerHTML = "Loading...";

    try {

        const response = await fetch("https://birthday-server-el1b.onrender.com/birthday", {
            method: "POST",
            headers: {
                "Content-Type":"application/json"
            },
            body: JSON.stringify({ dob })
        });

        const data = await response.json();

        if(data.success){

            resultDiv.innerHTML = `
                <p>Age: ${data.age}</p>
                <p>Days Lived: ${data.daysLived}</p>
                <p>Hours Lived: ${data.hoursLived}</p>
                <p>Minutes Lived: ${data.minutesLived}</p>
                <p>Seconds Lived: ${data.secondsLived}</p>
            `;

        } else {
            resultDiv.innerHTML = data.message;
        }

    } catch(err){
        resultDiv.innerHTML = "Server error";
    }

}
</script>

</body>
</html>
